<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가지무침 체크리스트 도우미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'sans-serif';
        }

        .title-font {
            font-family: 'Do Hyeon', sans-serif;
        }

        .expired {
            background-color: #fee2e2 !important;
            border: 2px solid #ef4444;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen p-4 text-gray-800">

    <div class="max-w-4xl mx-auto relative">
        <!-- 오디오 제어 버튼 -->
        <button id="alarmToggle" onclick="toggleAlarm()"
            class="absolute top-4 right-4 text-2xl p-2 rounded-full hover:bg-gray-200 transition-colors z-10">🔊</button>

        <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

        <!-- 타이틀 섹션: 연두색 그라데이션 적용 -->
        <div class="text-center mb-8 pt-4">
            <div class="inline-block relative">
                <h1 class="text-4xl md:text-5xl font-bold tracking-tight px-4 py-2 italic title-font" style="background: linear-gradient(135deg, #84cc16 0%, #4d7c0f 100%);
                           -webkit-background-clip: text;
                           -webkit-text-fill-color: transparent;
                           filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1));">
                    가지무침 체크리스트 도우미
                </h1>
                <div class="h-1.5 w-full bg-gradient-to-r from-transparent via-lime-400 to-transparent mt-1 opacity-60">
                </div>
            </div>
            <p class="text-gray-500 mt-2 text-sm font-medium italic">🍑 쨔니가 섹시해지는 그날까지 🍑</p>
        </div>

        <!-- 입력 섹션 -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-lime-100 mb-6">
            <div class="flex flex-wrap gap-2">
                <select id="iconInput"
                    class="border p-2 rounded-lg focus:outline-lime-500 bg-white cursor-pointer text-lg">
                    <option value="❗" title="느낌표">❗</option>
                    <option value="🏭" title="공장">🏭</option>
                    <option value="💎" title="광석">💎</option>
                    <option value="🌲" title="나무">🌲</option>
                    <option value="🍳" title="요리">🍳</option>
                    <option value="🔨" title="망치">🔨</option>
                    <option value="🗡️" title="단검">🗡️</option>
                </select>
                <input id="taskInput" type="text" placeholder="할 일 입력"
                    class="flex-1 min-w-[200px] border p-2 rounded-lg focus:outline-lime-500">
                <input id="timeInput" type="number" placeholder="분"
                    class="w-20 border p-2 rounded-lg focus:outline-lime-500">
                <button onclick="addTask()"
                    class="bg-lime-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-lime-600 transition shadow-sm">추가</button>
            </div>
        </div>

        <!-- 그룹 섹션 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Group 1: 반복 (기존 진행) -->
            <div class="bg-lime-50 p-4 rounded-xl min-h-[300px] border border-lime-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg title-font text-lime-700 text-sm">🔁 반복 리스트</h2>
                    <button onclick="startGroup('active')"
                        class="text-xs bg-lime-600 text-white px-2 py-1 rounded hover:bg-lime-700">그룹 재시작</button>
                </div>
                <div id="activeList" class="space-y-3"></div>
            </div>

            <!-- Group 2: 대기 -->
            <div class="bg-gray-100 p-4 rounded-xl min-h-[300px] border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg title-font text-gray-700 text-sm">⏳ 대기 리스트</h2>
                    <button onclick="startGroup('pending')"
                        class="text-xs bg-lime-600 text-white px-2 py-1 rounded hover:bg-lime-700">그룹 재시작</button>
                </div>
                <div id="pendingList" class="space-y-3"></div>
            </div>

        </div>
    </div>

    <script>
        // 알람 상태 관리
        let isAlarmEnabled = JSON.parse(localStorage.getItem('isAlarmEnabled')) ?? true;
        const alarmToggleBtn = document.getElementById('alarmToggle');
        const alarmSound = document.getElementById('alarmSound');

        // 초기 아이콘 설정
        alarmToggleBtn.innerText = isAlarmEnabled ? '🔊' : '🔇';


        // 초기 기본 데이터 설정
        const defaultTasks = [
            { id: 1, title: "흑오팔 넉넉하게 캐기", duration: 0, remaining: 0, status: 'pending', isRunning: false, isExpired: false, icon: '💎' },
            { id: 2, title: "농장 수확하기", duration: 60, remaining: 3600, status: 'active', isRunning: false, isExpired: false, icon: '🏭' },
            { id: 3, title: "지폐 뽑아두기", duration: 40, remaining: 300, status: 'active', isRunning: false, isExpired: false, icon: '🏭' },
            { id: 4, title: "채광팰 찾기", duration: 0, remaining: 0, status: 'pending', isRunning: false, isExpired: false, icon: '🗡️' },
            { id: 5, title: "섹시해지기", duration: 0, remaining: 0, status: 'pending', isRunning: false, isExpired: false, icon: '❗' },
            { id: 6, title: "요리 돌려두기", duration: 60, remaining: 3600, status: 'active', isRunning: false, isExpired: false, icon: '🍳' },

        ];

        let tasks = JSON.parse(localStorage.getItem('tasks'));

        if (!tasks || tasks.length === 0) {
            tasks = defaultTasks;
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            render();
        }

        // 할 일 입력 란에서 엔터키 누를 때 이벤트 처리
        document.getElementById('taskInput').addEventListener('keydown', function (event) {
            if (event.isComposing) return; // 한글 등 조합 문자 입력 시 이벤트 중복 발생 방지
            if (event.key === 'Enter') {
                event.preventDefault(); // 브라우저의 기본 동작(예: 폼 제출)으로 인해 addTask가 두 번 호출되는 것을 방지합니다.
                addTask();
            }
        });

        // 시간 입력 란에서도 엔터를 누르면 할 일이 추가되도록 이벤트 처리
        document.getElementById('timeInput').addEventListener('keydown', function (event) {
            // isComposing 체크는 주로 텍스트 입력 필드에서 의미가 있지만, 일관성을 위해 추가합니다.
            if (event.key === 'Enter') {
                event.preventDefault();
                addTask();
            }
        });

        function addTask() {
            const title = document.getElementById('taskInput').value.trim();
            const minutes = parseInt(document.getElementById('timeInput').value) || 0;
            const icon = document.getElementById('iconInput').value;
            if (!title) return;

            const newTask = {
                id: Date.now(),
                title,
                duration: minutes,
                remaining: minutes * 60,
                status: 'pending',
                isRunning: false,
                isExpired: false,
                icon: icon
            };

            tasks.push(newTask);
            document.getElementById('taskInput').value = '';
            document.getElementById('timeInput').value = '';
            document.getElementById('iconInput').value = '❗'; // 기본 아이콘으로 초기화
            saveTasks();
        }

        function moveTask(id) {
            const task = tasks.find(t => t.id === id);
            task.status = task.status === 'pending' ? 'active' : 'pending';
            saveTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
        }

        function updateTaskIcon(id, newIcon) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.icon = newIcon;
                saveTasks();
            }
        }

        function updateTaskDuration(id, newDuration) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                const mins = Math.max(0, parseInt(newDuration) || 0); // 음수 방지
                task.duration = mins;
                task.remaining = mins * 60;
                saveTasks();
            }
        }

        function toggleTimer(id) {
            const task = tasks.find(t => t.id === id);
            if (task.isExpired) {
                task.remaining = task.duration * 60;
                task.isExpired = false;
                task.isRunning = true;
            } else {
                if (task.isRunning) {
                    // 동작 중 '정지'를 누르면 남은 시간을 초기 설정 시간으로 리셋
                    task.isRunning = false;
                    task.remaining = task.duration * 60;
                } else {
                    // 시작
                    task.isRunning = true;
                }
            }
            saveTasks();
        }

        function toggleAlarm() {
            isAlarmEnabled = !isAlarmEnabled;
            alarmToggleBtn.innerText = isAlarmEnabled ? '🔊' : '🔇';
            localStorage.setItem('isAlarmEnabled', JSON.stringify(isAlarmEnabled));
        }

        function startGroup(status) {
            tasks.forEach(t => {
                if (t.status === status) {
                    t.isRunning = true;
                    t.remaining = t.duration * 60;
                    t.isExpired = false;
                }
            });
            saveTasks();
        }

        setInterval(() => {
            let changed = false;
            tasks.forEach(task => {
                if (task.isRunning && task.remaining > 0) {
                    task.remaining--;
                    changed = true;
                    if (task.remaining <= 0) {
                        task.isRunning = false;
                        task.isExpired = true;
                        if (isAlarmEnabled) {
                            alarmSound.play();
                        }
                    }
                }
            });
            if (changed || tasks.some(t => t.isExpired)) render();
        }, 1000);

        function render() {
            const pList = document.getElementById('pendingList');
            const aList = document.getElementById('activeList');
            pList.innerHTML = '';
            aList.innerHTML = '';

            tasks.forEach(task => {
                const m = Math.floor(task.remaining / 60);
                const s = task.remaining % 60;
                const timeStr = `${m}:${s < 10 ? '0' + s : s}`;

                let timeHtml = '';
                if (task.isExpired) {
                    timeHtml = `<div class="text-sm mt-1 text-red-600 font-bold">⏱ 시간 종료!</div>`;
                } else if (!task.isRunning) {
                    timeHtml = `<div class="text-sm mt-1 text-gray-500 flex items-center">
                        설정 시간: <input type="number" min="0" value="${task.duration}" onchange="updateTaskDuration(${task.id}, this.value)" class="w-16 border rounded px-1 py-0 mx-1 text-center focus:outline-lime-500 bg-gray-50 text-gray-800"> 분
                    </div>`;
                } else {
                    timeHtml = `<div class="text-sm mt-1 text-gray-500">남은 시간: ${timeStr}</div>`;
                }

                // 생성된 카드에 사용할 아이콘 옵션 및 기존 데이터 호환성 처리
                const iconValue = task.icon || '❗';
                const icons = ['❗', '🏭', '💎', '🌲', '🍳', '🔨', '🔪', '⚔️', '🗡️'];
                const iconOptions = icons.map(i => `<option value="${i}" ${iconValue === i ? 'selected' : ''}>${i}</option>`).join('');

                const card = document.createElement('div');
                card.className = `bg-white p-4 rounded-lg shadow-sm border-l-4 ${task.isExpired ? 'expired' : 'border-lime-500'} transition-all`;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-1 -ml-1">
                                <select onchange="updateTaskIcon(${task.id}, this.value)" class="text-xl bg-transparent border-none focus:outline-none cursor-pointer rounded hover:bg-gray-100 p-0.5" title="아이콘 변경">
                                    ${iconOptions}
                                </select>
                                <div class="font-bold text-gray-800">${task.title}</div>
                            </div>
                            ${timeHtml}
                        </div>
                        <div class="flex gap-1 ml-2">
                            <button onclick="toggleTimer(${task.id})" class="text-[10px] px-2 py-1 bg-gray-50 border rounded hover:bg-gray-100">
                                ${task.isRunning ? '정지' : (task.isExpired ? '재시작' : '시작')}
                            </button>
                            <button onclick="moveTask(${task.id})" class="text-[10px] px-2 py-1 bg-gray-50 border rounded hover:bg-gray-100">이동</button>
                            <button onclick="deleteTask(${task.id})" class="text-[10px] px-2 py-1 text-red-400 hover:text-red-600">삭제</button>
                        </div>
                    </div>
                `;

                if (task.status === 'pending') pList.appendChild(card);
                else aList.appendChild(card);
            });
        }

        render();
    </script>
</body>

</html>
